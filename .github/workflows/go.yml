name: Go

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  build:
    name: Build & Run Tests
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go 1.26
      uses: actions/setup-go@v6
      with:
        go-version: ^1.26

    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Building
      run: go build -v ./...

    - name: Testing
      run: go test -cover ./...
